<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>windfoil — soft shadows</title>
    <style>
      :root {
        color-scheme: light;
        --mono:
          ui-monospace, "SF Mono", SFMono-Regular, "JetBrains Mono",
          "Fira Code", "Cascadia Code", "Roboto Mono", Menlo, Consolas,
          monospace;
        --pad-h: 0px;
        --pad-v: 0px;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        background: #e9e3d5;
        color: #1a1a1a;
        font: 13px var(--mono);
      }
      #gpu {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
        cursor: grab;
      }
      #gpu:active {
        cursor: grabbing;
      }
      .overlay {
        position: fixed;
        z-index: 1;
        font-family: var(--mono);
        font-size: 13px;
        user-select: none;
      }
      .hud {
        background: rgba(255, 255, 255, 0.82);
        padding: 10px;
        box-sizing: border-box;
      }
      #fps {
        top: var(--pad-v);
        left: var(--pad-h);
        min-width: 150px;
      }
      #repo {
        top: var(--pad-v);
        right: var(--pad-h);
      }
      #repo a {
        color: currentColor;
        font-weight: 700;
        text-decoration: none;
      }
      #repo a:hover {
        text-decoration: underline;
      }
      #tagline {
        left: var(--pad-h);
        bottom: var(--pad-v);
        max-width: 62vw;
        line-height: 1.5;
      }
      /* Controls, bottom-right. Plain HTML range inputs — no framework. */
      #controls {
        right: var(--pad-h);
        bottom: var(--pad-v);
        display: grid;
        grid-template-columns: auto 120px;
        gap: 6px 10px;
        align-items: center;
      }
      #controls label {
        white-space: nowrap;
      }
      #controls input[type="range"] {
        width: 120px;
      }
      #controls .row {
        grid-column: 1 / -1;
        display: flex;
        gap: 14px;
        align-items: center;
        justify-content: space-between;
      }
      #controls button {
        font: 12px var(--mono);
        cursor: pointer;
      }
      #error {
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        max-width: 80%;
        text-align: center;
        color: #d40000;
        display: none;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "opentype.js": "https://esm.sh/opentype.js@1.3.5"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="gpu"></canvas>

    <div id="fps" class="overlay hud">— fps</div>
    <div id="repo" class="overlay hud">
      <a href="https://github.com/texel-org/windfoil" target="_blank" rel="noopener">
        texel-org/windfoil ↗
      </a>
    </div>
    <div id="tagline" class="overlay hud">
      analytic soft shadows — the leaves' vector silhouette, box-filtered per pixel at a footprint
      that widens with the leaf's height. Sharp at contact, soft up high. No blur pass, no SDF.
    </div>

    <form id="controls" class="overlay hud">
      <label for="soft">sun softness</label>
      <input id="soft" type="range" min="0" max="80" step="1" value="30" />
      <label for="len">shadow length</label>
      <input id="len" type="range" min="0" max="500" step="5" value="230" />
      <label for="dens">shadow density</label>
      <input id="dens" type="range" min="0" max="1" step="0.02" value="0.5" />
      <div class="row">
        <label><input id="leaves" type="checkbox" /> show leaves</label>
        <button id="reset" type="button">reset view</button>
      </div>
    </form>

    <div id="error" class="overlay">WebGPU isn't available in this browser.</div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
