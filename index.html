<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>windfoil — pan &amp; zoom</title>
    <style>
      :root {
        color-scheme: light;
        /* A modern monospace stack (falls back through OS/editor fonts to the generic monospace). */
        --mono:
          ui-monospace, "SF Mono", SFMono-Regular, "JetBrains Mono",
          "Fira Code", "Cascadia Code", "Roboto Mono", Menlo, Consolas,
          monospace;
        --pad-h: 0px;
        --pad-v: 0px;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #e9e3d5;
        color: #000;
        font: 13px var(--mono);
      }
      /* The canvas fills the viewport and owns its WebGPU swapchain (one context, no copies). */
      #gpu {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none; /* we handle pan/zoom ourselves (pointer + wheel) */
        cursor: grab;
      }
      #gpu:active {
        cursor: grabbing;
      }
      /* The four corners — all the SAME size (13px), only the repo link is bold. Plain HTML, no framework. */
      .overlay {
        position: fixed;
        z-index: 1;
        font-family: var(--mono);
        font-size: 13px;
        user-select: none;
      }
      #fps {
        top: var(--pad-v);
        left: var(--pad-h);
      }
      #repo {
        top: var(--pad-v);
        right: var(--pad-h);
      }
      #repo a {
        color: currentColor;
        font-weight: 700; /* the one exception: the link is bold */
        text-decoration: none;
      }
      #repo a:hover {
        text-decoration: underline;
      }
      #tagline {
        left: var(--pad-h);
        bottom: var(--pad-v);
        max-width: 60vw;
      }
      #hint {
        right: var(--pad-h);
        bottom: var(--pad-v);
      }
      /* On a narrow screen (phones), give the bottom-left tagline a tighter column so it wraps to a few
         lines instead of running most of the viewport width (and crowding the bottom-right hint). Same font. */
      @media (max-width: 640px) {
        #tagline {
          max-width: 45vw;
        }
      }
      /* Fallback: a simple red message centered on the page if WebGPU isn't available. */
      #error {
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        max-width: 80%;
        text-align: center;
        color: #d40000;
        display: none;
      }
      .hud {
        background: white;
        padding: 10px;
        box-sizing: border-box;
      }
    </style>
    <!-- No bundler: the shared src/*.js modules import opentype.js by its bare name; map it to an ESM build so
         the browser resolves the same specifier Deno does. Everything else is relative to the repo root. -->
    <script type="importmap">
      {
        "imports": {
          "opentype.js": "https://esm.sh/opentype.js@1.3.5"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="gpu"></canvas>

    <div id="fps" class="overlay hud">— fps</div>
    <div id="repo" class="overlay hud">
      <a
        href="https://github.com/texel-org/windfoil"
        target="_blank"
        rel="noopener"
      >
        texel-org/windfoil ↗
      </a>
    </div>
    <div id="tagline" class="overlay hud">
      per-pixel analytic anti-aliasing for 2D vector shapes
    </div>
    <div id="hint" class="overlay hud">pan &amp; zoom around</div>

    <div id="error" class="overlay">
      WebGPU isn't available in this browser.
    </div>

    <script type="module" src="./demo/main.js"></script>
  </body>
</html>
